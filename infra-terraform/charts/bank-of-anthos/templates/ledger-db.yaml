apiVersion: v1
kind: ConfigMap
metadata:
  name: ledger-db-config
data:
  POSTGRES_DB: {{ .Values.ledgerDb.database | quote }}
  POSTGRES_USER: {{ .Values.ledgerDb.user | quote }}
  POSTGRES_PASSWORD: {{ .Values.ledgerDb.password | quote }}
  SPRING_DATASOURCE_URL: {{ printf "jdbc:postgresql://%s:5432/%s?sslmode=%s" .Values.ledgerDb.host .Values.ledgerDb.database .Values.ledgerDb.sslmode | quote }}
  SPRING_DATASOURCE_USERNAME: {{ .Values.ledgerDb.user | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.ledgerDb.password | quote }}
{{- if .Values.inClusterDatabase }}
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-db
spec:
  type: ClusterIP
  selector:
    app: ledger-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ledger-db
spec:
  replicas: 1
  serviceName: ledger-db
  selector:
    matchLabels:
      app: ledger-db
  template:
    metadata:
      labels:
        app: ledger-db
    spec:
      serviceAccountName: default
      containers:
        - name: ledger-db
          image: {{ .Values.acrLoginServer }}/ledger-db:{{ .Values.imageTag }}
          envFrom:
            - configMapRef:
                name: environment-config
            - configMapRef:
                name: ledger-db-config
            - configMapRef:
                name: demo-data-config
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: postgresdb
              mountPath: /var/lib/postgresql/data
              subPath: postgres
      volumes:
        - name: postgresdb
          emptyDir: {}
{{- end }}