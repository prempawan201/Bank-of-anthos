apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgenerator
spec:
  selector:
    matchLabels:
      app: loadgenerator
  template:
    metadata:
      labels:
        app: loadgenerator
    spec:
      serviceAccountName: default
      containers:
        - name: loadgenerator
          image: "{{ .Values.acrLoginServer }}/loadgenerator:{{ .Values.imageTag }}"
          imagePullPolicy: Always
          env:
            - { name: FRONTEND_ADDR, value: "frontend:80" }
            - { name: USERS, value: "5" }
            - { name: LOG_LEVEL, value: "info" }