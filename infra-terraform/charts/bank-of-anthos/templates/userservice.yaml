apiVersion: apps/v1
kind: Deployment
metadata:
  name: userservice
spec:
  selector:
    matchLabels:
      app: userservice
  template:
    metadata:
      labels:
        app: userservice
    spec:
      serviceAccountName: default
      containers:
        - name: userservice
          image: "{{ .Values.acrLoginServer }}/userservice:{{ .Values.imageTag }}"
          imagePullPolicy: Always
          envFrom:
            - configMapRef: { name: environment-config }
            - configMapRef: { name: accounts-db-config }
          env:
            - { name: PORT, value: "8080" }
            - { name: ENABLE_TRACING, value: "false" }
            - { name: ENABLE_METRICS, value: "false" }
            - { name: TOKEN_EXPIRY_SECONDS, value: "3600" }
            - { name: PRIV_KEY_PATH, value: "/root/.ssh/privatekey" }
            - { name: LOG_LEVEL, value: "info" }
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: keys
              mountPath: /root/.ssh
              readOnly: true
            # - { name: keys, mountPath: /root/.ssh, readOnly: true }
      volumes: #trying to mount the secret as a volume using jwt-bootstrap-job using helmhook
          - name: keys
            csi:
              driver: secrets-store.csi.k8s.io
              readOnly: true
              volumeAttributes:
                secretProviderClass: jwt-key-provider
        # - name: keys
        #   csi:
        #     driver: secrets-store.csi.k8s.io
        #     readOnly: true
        #     volumeAttributes:
        #       secretProviderClass: jwt-key-provider
---
apiVersion: v1
kind: Service
metadata:
  name: userservice
spec:
  type: ClusterIP
  selector:
    app: userservice
  ports:
    - port: 8080
      targetPort: 8080