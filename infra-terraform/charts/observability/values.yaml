# Base / prod-safe defaults.
kube-prometheus-stack:

  alertmanager:
    enabled: true          # CHANGED: was false. Alerting is now live across all envs.
    # Receiver config is environment-specific — see values-dev.yaml

  grafana:
    service:
      type: ClusterIP
    admin:
      existingSecret: grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    persistence:
      enabled: true
      size: 5Gi

  prometheus:
    prometheusSpec:
      replicas: 2
      retention: 15d
      retentionSize: "10GB"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          memory: 2Gi
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 20Gi

  prometheus-node-exporter:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi