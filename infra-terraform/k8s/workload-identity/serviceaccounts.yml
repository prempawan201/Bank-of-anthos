apiVersion: v1
kind: ServiceAccount
metadata:
  name: accounts-svc
  namespace: bank-of-anthos
  annotations:
    azure.workload.identity/client-id: "<output of accounts_svc_wi_client_id>"
---
apiVersion: v1
kind: Pod
metadata:
  name: postgres-wi-test
  namespace: bank-of-anthos
  labels:
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: accounts-svc
  containers:
    - name: psql
      image: mcr.microsoft.com/azure-cli:latest
      command:
        - /bin/bash
        - -c
        - |
          apt-get update -qq && apt-get install -y -qq postgresql-client
          PG_TOKEN=$(curl -s \
            "https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token" \
            -d "grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer" \
            -d "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer" \
            -d "client_assertion=$(cat ${AZURE_FEDERATED_TOKEN_FILE})" \
            -d "client_id=${AZURE_CLIENT_ID}" \
            -d "scope=https://ossrdbms-aad.database.windows.net/.default" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          PGPASSWORD="$PG_TOKEN" psql \
            -h psql-boa-dev-8459.postgres.database.azure.com \
            -U accounts_svc_entra -d accounts \
            -c "SELECT current_user, current_database();"
          echo "Postgres Workload Identity authentication SUCCESS"
          sleep 600