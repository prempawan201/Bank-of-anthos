trigger:
  branches:
    include:
      - develop
  paths:
    include:
      - ci-test/*
      - pipelines/templates/ci-service.yml

pool:
  vmImage: ubuntu-latest

variables:
  acrLoginServer: acrbankofanthos8459.azurecr.io
  dockerRegistryServiceConnection: sc-boa-acr-dev
  serviceName: ci-test
  imageTag: $(Build.BuildId)
  envTag: dev

steps:
  # Step 1 — Build only
  - task: Docker@2
    displayName: 'Build $(serviceName):$(imageTag)'
    inputs:
      containerRegistry: '$(dockerRegistryServiceConnection)'
      repository: '$(serviceName)'
      command: build
      Dockerfile: 'ci-test/Dockerfile'
      buildContext: 'ci-test'
      tags: |
        $(imageTag)
        $(envTag)
      addPipelineData: true
      addBaseImageData: true

  # Step 2 — Trivy scan LOCAL image before push
  - task: Trivy@1
    displayName: 'Trivy scan $(serviceName):$(imageTag)'
    inputs:
      version: 'latest'
      image: '$(acrLoginServer)/$(serviceName):$(imageTag)'
      severities: 'HIGH,CRITICAL'
      ignoreUnfixed: true
      exitCode: 0

  # Step 3 — SonarQube stub (activated at PLAT-12)
  - script: echo "SonarQube stub — activated at PLAT-12"
    displayName: 'SonarQube (stub)'

  # Step 4 — Push BuildId tag + dev alias (Trivy passed, safe to push)
  - task: Docker@2
    displayName: 'Push $(serviceName):$(imageTag) and :$(envTag)'
    inputs:
      containerRegistry: '$(dockerRegistryServiceConnection)'
      repository: '$(serviceName)'
      command: push
      tags: |
        $(imageTag)
        $(envTag)

